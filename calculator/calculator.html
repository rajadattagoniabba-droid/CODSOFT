<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <style>
        /* --- CSS STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .calculator {
            background-color: #2196F3; 
            padding: 20px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
        }

        .display {
            background-color: white;
            color: black;
            font-size: 3rem;
            text-align: right;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            overflow-x: auto;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 12px;
        }

        .btn {
            background-color: #1565C0; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.5rem;
            padding: 20px 0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:active {
            background-color: #0D47A1;
        }

        .action-btn {
            background-color: #0D47A1; 
        }

        .action-btn:active {
            background-color: #0a387e;
        }

        .equal {
            grid-column: 4;
            grid-row: 4 / span 2; 
        }

        .zero {
            grid-column: 1 / span 3;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div id="display" class="display">0</div>
    <div class="keys">
        <button class="btn action-btn" data-action="clear">C</button>
        <button class="btn action-btn" data-action="delete">DEL</button>
        <button class="btn action-btn" data-action="divide">/</button>
        <button class="btn action-btn" data-action="multiply">*</button>
        
        <button class="btn" data-action="number">7</button>
        <button class="btn" data-action="number">8</button>
        <button class="btn" data-action="number">9</button>
        <button class="btn action-btn" data-action="subtract">-</button>
        
        <button class="btn" data-action="number">4</button>
        <button class="btn" data-action="number">5</button>
        <button class="btn" data-action="number">6</button>
        <button class="btn action-btn" data-action="add">+</button>
        
        <button class="btn" data-action="number">1</button>
        <button class="btn" data-action="number">2</button>
        <button class="btn" data-action="number">3</button>
        <button class="btn action-btn equal" data-action="calculate">=</button>
        <button class="btn zero" data-action="number">0</button>
    </div>
</div>

<script>
    // --- JAVASCRIPT LOGIC ---
    const display = document.getElementById('display');
    const buttons = document.querySelectorAll('.btn');

    let currentInput = '0';
    let previousInput = '';
    let operator = undefined;
    let waitingForNewValue = false;

    // 1. Mouse Click Listeners
    buttons.forEach(button => {
        button.addEventListener('click', () => {
            const action = button.dataset.action;
            const buttonContent = button.textContent;

            if (action === 'number') {
                handleNumber(buttonContent);
            } 
            else if (action === 'clear' || action === 'delete') {
                // Both 'C' and 'DEL' buttons now clear all elements
                clearAllElements();
            } 
            else if (action === 'calculate') {
                calculateResult();
            } 
            else {
                handleOperator(buttonContent);
            }
            
            updateDisplay();
        });
    });

    // 2. Keyboard Event Listeners
    document.addEventListener('keydown', (event) => {
        const key = event.key;

        if (/[0-9]/.test(key)) {
            handleNumber(key);
            updateDisplay();
        } 
        else if (['+', '-', '*', '/'].includes(key)) {
            handleOperator(key);
            updateDisplay();
        } 
        else if (key === 'Enter' || key === '=') {
            event.preventDefault(); 
            calculateResult();
            updateDisplay();
        } 
        else if (key === 'Escape' || key.toLowerCase() === 'c' || key === 'Delete') {
            // Escape, 'c', and the 'Delete' key trigger clear all
            clearAllElements();
            updateDisplay();
        }
        else if (key === 'Backspace') {
            // Backspace key still deletes one element at a time
            deleteOneElement();
            updateDisplay();
        }
    });

    // --- CORE LOGIC FUNCTIONS ---

    function handleNumber(num) {
        if (waitingForNewValue) {
            currentInput = num;
            waitingForNewValue = false;
        } else {
            if (currentInput === '0') {
                currentInput = num;
            } else {
                currentInput += num;
            }
        }
    }

    function handleOperator(op) {
        if (operator !== undefined && !waitingForNewValue) {
            calculateResult();
        }
        previousInput = currentInput;
        operator = op;
        waitingForNewValue = true;
    }

    function calculateResult() {
        let result;
        const prev = parseFloat(previousInput);
        const current = parseFloat(currentInput);

        if (isNaN(prev) || isNaN(current)) return;

        if (operator === '+') result = prev + current;
        else if (operator === '-') result = prev - current;
        else if (operator === '*') result = prev * current;
        else if (operator === '/') {
            if (current === 0) {
                result = "Error"; 
            } else {
                result = prev / current;
            }
        } else {
            return;
        }

        currentInput = result.toString();
        operator = undefined;
        previousInput = '';
        waitingForNewValue = true;
    }

    function clearAllElements() {
        currentInput = '0';
        previousInput = '';
        operator = undefined;
        waitingForNewValue = false;
    }

    function deleteOneElement() {
        if (waitingForNewValue) return;
        currentInput = currentInput.slice(0, -1);
        if (currentInput === '' || currentInput === '-') {
            currentInput = '0';
        }
    }

    function updateDisplay() {
        display.textContent = currentInput;
    }
</script>
</body>
</html>
